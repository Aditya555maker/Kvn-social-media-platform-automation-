<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KVN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.2);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
input,textarea,select{font-family:inherit}

/* ── THEME ── */
[data-theme="dark"]{
  --bg:#0a0a12;--bg2:#13131f;--bg3:#0f0f1e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#fff;--text2:rgba(255,255,255,0.7);--text3:rgba(255,255,255,0.3);
  --inp-bg:#080810;--card-bg:#13131f;--nav-bg:#0f0f1e;
}
[data-theme="light"]{
  --bg:#f0f0f8;--bg2:#fff;--bg3:#f8f8ff;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#111;--text2:rgba(0,0,0,0.7);--text3:rgba(0,0,0,0.35);
  --inp-bg:#fff;--card-bg:#fff;--nav-bg:#fff;
}

/* ── APP SHELL ── */
body{background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,0.5)}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0;background:var(--bg);z-index:10}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#FF4444,#FF8C00,#FFD700);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#000;box-shadow:0 3px 12px rgba(255,120,0,0.4);flex-shrink:0}
.tb-name{font-weight:900;font-size:18px;letter-spacing:2.5px;background:linear-gradient(135deg,#FF5555,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-sub{font-size:8px;color:var(--text3);letter-spacing:2px}
.tb-right{display:flex;align-items:center;gap:8px}
.gen-pill{display:none;align-items:center;gap:6px;background:rgba(255,184,0,0.08);border:1px solid rgba(255,184,0,0.25);border-radius:20px;padding:5px 10px}
.gen-pill.show{display:flex}
.gen-dot{width:6px;height:6px;border-radius:50%;background:#FFB800;animation:pulse 1s infinite}
.gen-txt{font-size:10px;color:#FFB800;font-weight:700}
.theme-btn{width:32px;height:32px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all 0.2s}
.theme-btn:active{transform:scale(0.9)}

/* ── SCROLL AREA ── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 80px}

/* ── BOTTOM NAV ── */
#bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--nav-bg);border-top:1px solid var(--border);display:flex;z-index:20;padding:8px 0 12px}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;transition:all 0.2s}
.bn-icon{font-size:18px;transition:transform 0.2s}
.bn-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:0.5px;transition:color 0.2s}
.bn-item.active .bn-label{color:#FF8C00}
.bn-item.active .bn-icon{transform:scale(1.18);animation:pop 0.3s ease}

/* ── PAGE ── */
.page{padding:4px 16px 0;animation:fadeUp 0.28s ease}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin:18px 0 10px}

/* ── CARDS ── */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}

/* ── INPUTS ── */
.field{margin-bottom:12px}
.field-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.inp{width:100%;background:var(--inp-bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:14px;outline:none;transition:border 0.2s;color:var(--text);-webkit-appearance:none}
.inp:focus{border-color:var(--border2)}
.sel{width:100%;background:var(--inp-bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:14px;outline:none;color:var(--text);-webkit-appearance:none;cursor:pointer}
textarea.inp{resize:none;min-height:110px;line-height:1.7}
.word-count{font-size:10px;color:var(--text3);text-align:right;margin-top:4px}

/* ── BUTTONS ── */
.btn-primary{width:100%;background:linear-gradient(135deg,#FF4444,#FF8C00);border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;letter-spacing:0.5px;transition:opacity 0.2s}
.btn-primary:active{opacity:0.8}
.btn-green{background:#00FF88;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;width:100%}
.btn-sm{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-copy{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-copy.copied{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.3);color:#00FF88}

/* ── TOOL GRID ── */
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tool-card{background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all 0.18s;text-align:left;color:var(--text);font-family:inherit;width:100%;position:relative}
.tool-card:active{transform:scale(0.97)}
.tool-card.active{border-color:rgba(255,140,0,0.5);background:rgba(255,140,0,0.06)}
.tool-emoji{font-size:22px;margin-bottom:7px}
.tool-name{font-size:13px;font-weight:700;margin-bottom:2px}
.tool-desc{font-size:10px;color:var(--text3)}
.fav-star{position:absolute;top:10px;right:10px;font-size:14px;cursor:pointer;opacity:0.4;transition:all 0.2s}
.fav-star.active{opacity:1;animation:pop 0.3s ease}

/* ── OUTPUT ── */
.output-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;animation:fadeUp 0.25s ease}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.output-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px}
.output-text{font-size:13px;line-height:1.85;color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto}
.output-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.spinner{width:15px;height:15px;border:2px solid rgba(255,184,0,0.25);border-top-color:#FFB800;border-radius:50%;animation:spin 0.75s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
.out-stats{font-size:10px;color:var(--text3);margin-top:6px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat-box{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.stat-num{font-size:32px;font-weight:900;margin-bottom:3px}
.stat-lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:2px}

/* ── CHANNEL ── */
.ch-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:9px;cursor:pointer;transition:border 0.2s}
.ch-card.selected{border-color:rgba(255,140,0,0.5)}
.ch-avatar{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge-usa{background:rgba(68,136,255,0.12);color:#4488FF}
.badge-india{background:rgba(255,102,68,0.12);color:#FF6644}
.badge-niche{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
[data-theme="light"] .badge-niche{background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.5)}

/* ── PLATFORM ── */
.plat-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.plat-row::-webkit-scrollbar{display:none}
.plat-chip{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;padding:10px 12px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;transition:all 0.18s;min-width:60px}
.plat-chip.active{border-color:var(--border2);background:rgba(255,140,0,0.06)}
.plat-chip:active{transform:scale(0.95)}
.plat-emoji{font-size:20px}
.plat-name{font-size:9px;font-weight:600;color:var(--text3);white-space:nowrap}
.plat-chip.active .plat-name{color:#FF8C00}

/* ── HISTORY ── */
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:9px}
.hist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hist-title{font-size:13px;font-weight:700}
.hist-meta{font-size:10px;color:var(--text3);margin-bottom:6px}
.hist-preview{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── MISC ── */
.add-form{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;display:none}
.add-form.open{display:block;animation:fadeUp 0.2s ease}
.empty-state{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:500}
.empty-sub{font-size:11px;margin-top:5px;color:var(--text3)}
.fav-section{margin-bottom:14px}
.time-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:9px}
.time-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cpm-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cpm-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px}
.selected-ch-bar{background:rgba(255,140,0,0.08);border:1px solid rgba(255,140,0,0.2);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="tb-left">
      <div class="tb-logo">K</div>
      <div>
        <div class="tb-name">KVN</div>
        <div class="tb-sub">KONTENT VIRAL NETWORK</div>
      </div>
    </div>
    <div class="tb-right">
      <div class="gen-pill" id="gen-pill"><div class="gen-dot"></div><span class="gen-txt">GENERATING...</span></div>
      <div class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</div>
    </div>
  </div>

  <div id="content"></div>

  <div id="bottomnav">
    <div class="bn-item active" onclick="goTo('home')" id="bn-home"><span class="bn-icon">⊞</span><span class="bn-label">Home</span></div>
    <div class="bn-item" onclick="goTo('create')" id="bn-create"><span class="bn-icon">✦</span><span class="bn-label">Create</span></div>
    <div class="bn-item" onclick="goTo('social')" id="bn-social"><span class="bn-icon">◎</span><span class="bn-label">Social</span></div>
    <div class="bn-item" onclick="goTo('factory')" id="bn-factory"><span class="bn-icon">⚙</span><span class="bn-label">Factory</span></div>
    <div class="bn-item" onclick="goTo('more')" id="bn-more"><span class="bn-icon">◆</span><span class="bn-label">More</span></div>
  </div>
</div>

<script>
// ── STATE ──
let activePage='home', activeTool=null, activeSocial='instagram';
let aiOutput='', isLoading=false;
let channels=[], favorites=[], history=[], selectedChannel=null;
let isDark=true;
window._niche=''; window._topic=''; window._lang='english';
window._factory_text=''; window._strat_niche='';

// ── TOOLS ──
const YT_TOOLS=[
  {id:'script',icon:'📝',name:'Script',desc:'Full video script',p:(n,t,l)=>`Write a complete ${l==='hindi'?'Hindi':'US English'} YouTube script about "${t}" in "${n}" niche. Include: Hook (30s), Main Content with sections, CTA, Outro. Natural, engaging, human-like.`},
  {id:'titles',icon:'🎯',name:'5 Viral Titles',desc:'Click-worthy titles',p:(n,t,l)=>`Generate 5 viral YouTube titles for "${t}" in "${n}" niche for ${l==='hindi'?'Indian':'USA'} audience. SEO optimized, click-worthy. Number 1-5.`},
  {id:'tags',icon:'🏷',name:'Tags & Hashtags',desc:'30 tags + hashtags',p:(n,t,l)=>`Generate 30 YouTube SEO tags and 10 hashtags for "${t}" in "${n}" niche. ${l==='hindi'?'Hindi':'USA'} audience. Comma-separated tags, then hashtags.`},
  {id:'desc',icon:'📄',name:'Description',desc:'Full SEO description',p:(n,t,l)=>`Write complete YouTube description for "${t}" in "${n}" niche. ${l==='hindi'?'Indian':'USA'} audience. Hook, summary, timestamps, keywords, CTA.`},
  {id:'thumb',icon:'🖼',name:'Thumbnail Ideas',desc:'5 concepts',p:(n,t,l)=>`5 YouTube thumbnail ideas for "${t}" in "${n}" niche for ${l==='hindi'?'Indian':'USA'} audience. Layout, text (max 5 words), colors, emotion, click psychology.`},
  {id:'shorts',icon:'⚡',name:'5 Shorts',desc:'Short scripts',p:(n,t,l)=>`Create 5 YouTube Shorts scripts (30-60 sec each) for "${t}" in "${n}" for ${l==='hindi'?'Indian':'USA'} audience. Strong hook each. Number 1-5.`},
  {id:'human',icon:'🧠',name:'Human Check',desc:'Will it monetize?',p:(n,t,l)=>`Analyze "${t}" in "${n}" for ${l==='hindi'?'Hindi Indian':'USA'} YouTube. Human-like? Engaging? Monetizable? Score /100 with detailed feedback.`},
  {id:'precheck',icon:'✅',name:'Pre-Upload Check',desc:'Full quality scan',p:(n,t,l)=>`Pre-upload check for "${t}" in "${n}" for ${l==='hindi'?'India':'USA'} YouTube. Content, SEO, Title, Tags, Description, Copyright, Guidelines, Monetization. Green/Yellow/Red each. Score /100.`},
];
const SOCIAL_TOOLS={
  instagram:[
    {id:'reel',icon:'🎬',name:'Reel Script',desc:'30-60 sec',p:(n,t)=>`Instagram Reel script for "${t}" in "${n}". 30-60 sec. Hook in 3 secs, CTA.`},
    {id:'caption',icon:'✍',name:'Caption',desc:'3 captions',p:(n,t)=>`3 Instagram captions for "${t}" in "${n}". Emojis, engagement, CTA.`},
    {id:'hashtags',icon:'#',name:'Hashtags',desc:'30 tags',p:(n,t)=>`30 Instagram hashtags for "${t}" in "${n}". Mix popular, medium, niche.`},
    {id:'story',icon:'📱',name:'Story Ideas',desc:'5 ideas',p:(n,t)=>`5 Instagram Story ideas for "${t}" in "${n}". Polls, questions, interactive.`},
    {id:'trending',icon:'🔥',name:'Trending',desc:'Top 10',p:(n,t)=>`Top 10 trending Instagram topics for "${n}" related to "${t}".`},
  ],
  tiktok:[
    {id:'script',icon:'🎬',name:'TikTok Script',desc:'Viral script',p:(n,t)=>`TikTok script for "${t}" in "${n}". 15-60 sec. Viral hook in 2 secs.`},
    {id:'hook',icon:'🪝',name:'Hooks',desc:'10 scroll-stoppers',p:(n,t)=>`10 powerful TikTok hooks for "${t}" in "${n}". Stop scroll in 2 secs each.`},
    {id:'hashtags',icon:'#',name:'Hashtags',desc:'FYP + niche',p:(n,t)=>`20 TikTok hashtags for "${t}" in "${n}". FYP + niche tags.`},
    {id:'trending',icon:'🔥',name:'Trending',desc:'Top 10',p:(n,t)=>`Top 10 trending TikTok topics for "${n}" related to "${t}". Sound suggestions.`},
  ],
  facebook:[
    {id:'post',icon:'📝',name:'Post',desc:'3 posts',p:(n,t)=>`3 Facebook posts for "${t}" in "${n}". Emojis, questions, CTA.`},
    {id:'video',icon:'🎬',name:'Video Script',desc:'2-5 min',p:(n,t)=>`Facebook video script for "${t}" in "${n}". 2-5 min. Hook, value, CTA.`},
    {id:'hashtags',icon:'#',name:'Hashtags',desc:'15 tags',p:(n,t)=>`15 Facebook hashtags for "${t}" in "${n}".`},
    {id:'trending',icon:'🔥',name:'Trending',desc:'Top 10',p:(n,t)=>`Top 10 trending Facebook topics for "${n}" related to "${t}".`},
  ],
  twitter:[
    {id:'thread',icon:'🧵',name:'Thread',desc:'10 tweets',p:(n,t)=>`Viral Twitter/X thread about "${t}" in "${n}". 10 tweets. Hook, value, CTA.`},
    {id:'tweet',icon:'✍',name:'Tweets',desc:'5 viral',p:(n,t)=>`5 viral tweets about "${t}" in "${n}". Under 280 chars. Hashtags.`},
    {id:'hashtags',icon:'#',name:'Hashtags',desc:'Trending',p:(n,t)=>`10 trending Twitter hashtags for "${t}" in "${n}".`},
    {id:'trending',icon:'🔥',name:'Trending',desc:'Top 10',p:(n,t)=>`Top 10 trending Twitter topics for "${n}" related to "${t}".`},
  ],
  linkedin:[
    {id:'article',icon:'📰',name:'Article',desc:'Pro article',p:(n,t)=>`LinkedIn article about "${t}" in "${n}". Hook, value, CTA.`},
    {id:'post',icon:'✍',name:'Post',desc:'3 posts',p:(n,t)=>`3 LinkedIn posts about "${t}" in "${n}". Professional, value-driven.`},
    {id:'hashtags',icon:'#',name:'Hashtags',desc:'15 tags',p:(n,t)=>`15 LinkedIn hashtags for "${t}" in "${n}".`},
    {id:'trending',icon:'🔥',name:'Trending',desc:'Top 10',p:(n,t)=>`Top 10 trending LinkedIn topics for "${n}" related to "${t}".`},
  ],
};
const FACTORY_TOOLS=[
  {id:'shorts',icon:'✂',name:'Long → 5 Shorts',desc:'Extract moments',p:(c)=>`Extract 5 Short scripts (30-60 sec) from this content. Best moments. Number 1-5:\n\n${c}`},
  {id:'repurpose',icon:'♻',name:'Repurpose All',desc:'6 platforms',p:(c)=>`Repurpose for: YouTube desc, Instagram caption+hashtags, TikTok, Twitter thread (5 tweets), LinkedIn, Facebook. Label each:\n\n${c}`},
  {id:'human',icon:'🧠',name:'Human Check',desc:'Natural test',p:(c)=>`Analyze: Human-like? Engaging? Monetizable? Score /100 + feedback:\n\n${c}`},
  {id:'precheck',icon:'✅',name:'Final Pre-Upload',desc:'Quality scan',p:(c)=>`Pre-upload check: Content, SEO, Grammar, Copyright, Guidelines, Monetization. Green/Yellow/Red each. Score /100:\n\n${c}`},
];
const STRAT_TOOLS=[
  {id:'competitor',icon:'🔍',name:'Competitor Analysis',desc:'Who is winning',p:(n)=>`Top YouTube competitors in "${n}". What works? Gaps? How to stand out?`},
  {id:'niche',icon:'✅',name:'Niche Validator',desc:'Is it worth it?',p:(n)=>`Validate niche "${n}". Competition, CPM, monetization, growth. Score /10.`},
  {id:'roadmap',icon:'📈',name:'90-Day Roadmap',desc:'Week by week',p:(n)=>`90-day YouTube growth roadmap for "${n}". Week by week plan.`},
  {id:'brand',icon:'🤝',name:'Brand Deal Email',desc:'Outreach template',p:(n)=>`Brand deal outreach email for YouTube channel in "${n}". Include subject.`},
  {id:'calendar',icon:'📅',name:'Content Calendar',desc:'30-day schedule',p:(n)=>`30-day content calendar for "${n}" YouTube channel. Daily topics, type, time.`},
  {id:'trending',icon:'🔥',name:'Trending Topics',desc:'Top 15 topics',p:(n)=>`Top 15 trending topics for "${n}" niche. Angle, views potential, platform.`},
];

// ── THEME ──
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('theme-btn').textContent=isDark?'🌙':'☀️';
  saveData();
}

// ── NAVIGATION ──
const TABS=['home','create','social','factory','more'];
function goTo(page){
  activePage=page; activeTool=null; aiOutput='';
  TABS.forEach(t=>document.getElementById('bn-'+t)?.classList.toggle('active',t===page));
  render();
}

// ── AI CALL ──
async function callAI(prompt,toolName){
  isLoading=true; aiOutput='';
  document.getElementById('gen-pill').classList.add('show');
  render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'You are KVN AI — expert YouTube and social media content strategist. Help creators build viral channels. Be specific, actionable, well-formatted.',
        messages:[{role:'user',content:prompt}]})
    });
    const d=await res.json();
    aiOutput=d.content?.map(b=>b.text||'').join('')||'Error.';
    // Save to history
    history.unshift({id:Date.now(),tool:toolName||activeTool,niche:window._niche||window._strat_niche,topic:window._topic,output:aiOutput,time:new Date().toLocaleString('en-IN',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'})});
    if(history.length>20) history.pop();
    saveData();
  }catch(e){aiOutput='Error: '+e.message;}
  isLoading=false;
  document.getElementById('gen-pill').classList.remove('show');
  render();
}

// ── COPY FUNCTIONS ──
function copyOut(){
  navigator.clipboard.writeText(aiOutput);
  flashCopy('copy-btn-main');
}
function copySection(text){
  navigator.clipboard.writeText(text);
}
function flashCopy(id){
  const b=document.getElementById(id);
  if(b){b.textContent='✓ Copied!';b.classList.add('copied');setTimeout(()=>{b.textContent='Copy All';b.classList.remove('copied');},2000);}
}

// ── FAVORITES ──
function toggleFav(toolId){
  const idx=favorites.indexOf(toolId);
  if(idx>-1) favorites.splice(idx,1);
  else favorites.push(toolId);
  saveData(); render();
}

// ── CHANNEL SELECT ──
function selectChannel(id){
  const ch=channels.find(c=>c.id===id);
  if(!ch) return;
  if(selectedChannel===id){selectedChannel=null; window._niche='';}
  else{selectedChannel=id; window._niche=ch.niche;}
  saveData(); render();
}

// ── WORD COUNT ──
function wordCount(text){
  if(!text) return '0 words • 0 chars';
  const w=text.trim().split(/\s+/).filter(Boolean).length;
  return `${w} words • ${text.length} chars`;
}

// ── SAVE/LOAD ──
function saveData(){
  try{
    localStorage.setItem('kvn_channels',JSON.stringify(channels));
    localStorage.setItem('kvn_favorites',JSON.stringify(favorites));
    localStorage.setItem('kvn_history',JSON.stringify(history));
    localStorage.setItem('kvn_niche',window._niche||'');
    localStorage.setItem('kvn_topic',window._topic||'');
    localStorage.setItem('kvn_lang',window._lang||'english');
    localStorage.setItem('kvn_strat',window._strat_niche||'');
    localStorage.setItem('kvn_theme',isDark?'dark':'light');
    localStorage.setItem('kvn_selch',selectedChannel||'');
  }catch(e){}
}
function loadData(){
  try{
    const ch=localStorage.getItem('kvn_channels'); if(ch) channels=JSON.parse(ch);
    const fv=localStorage.getItem('kvn_favorites'); if(fv) favorites=JSON.parse(fv);
    const hs=localStorage.getItem('kvn_history'); if(hs) history=JSON.parse(hs);
    window._niche=localStorage.getItem('kvn_niche')||'';
    window._topic=localStorage.getItem('kvn_topic')||'';
    window._lang=localStorage.getItem('kvn_lang')||'english';
    window._strat_niche=localStorage.getItem('kvn_strat')||'';
    const th=localStorage.getItem('kvn_theme');
    if(th==='light'){isDark=false;document.documentElement.setAttribute('data-theme','light');document.getElementById('theme-btn').textContent='☀️';}
    const sc=localStorage.getItem('kvn_selch'); if(sc) selectedChannel=parseInt(sc)||null;
  }catch(e){}
}

// ── RENDER ──
function render(){
  document.getElementById('content').innerHTML=getPage();
  // Restore inputs
  ['niche','topic','strat-niche'].forEach(f=>{
    const el=document.getElementById(f);
    if(el) el.value=window['_'+f.replace('-','_')]||'';
  });
  const ls=document.getElementById('lang'); if(ls) ls.value=window._lang||'english';
  const ft=document.getElementById('factory-text'); if(ft) ft.value=window._factory_text||'';
}

function getPage(){
  switch(activePage){
    case 'home': return homePage();
    case 'create': return createPage();
    case 'social': return socialPage();
    case 'factory': return factoryPage();
    case 'more': return morePage();
    default: return homePage();
  }
}

// ── OUTPUT HTML ──
function outputHTML(){
  if(!aiOutput&&!isLoading) return '';
  const wc=aiOutput?wordCount(aiOutput):'';
  // Split output into sections for section-copy
  const lines=aiOutput.split('\n');
  return `<div class="output-wrap">
    <div class="output-header">
      <span class="output-lbl">KVN OUTPUT</span>
      ${aiOutput?`<button class="btn-copy" id="copy-btn-main" onclick="copyOut()">Copy All</button>`:''}
    </div>
    <div class="output-text" id="out-text">
      ${isLoading?`<span class="spinner"></span><span style="color:#FFB800;font-size:13px">KVN generating...</span>`:escapeHtml(aiOutput)}
    </div>
    ${aiOutput?`<div class="out-stats">${wc}</div>`:''}
    ${aiOutput?`<div class="output-actions">
      <button class="btn-sm" onclick="copySection(document.getElementById('out-text').innerText.split('\\n').slice(0,5).join('\\n'))">Copy First Part</button>
      <button class="btn-sm" onclick="saveToHistory()">⭐ Save</button>
      <button class="btn-sm" onclick="shareOut()">Share</button>
    </div>`:''}
  </div>`;
}

window.saveToHistory=function(){alert('Already saved in History! ✅');};
window.shareOut=function(){
  if(navigator.share) navigator.share({title:'KVN Content',text:aiOutput});
  else{navigator.clipboard.writeText(aiOutput);alert('Copied to clipboard!');}
};

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toolGrid(tools,runFn){
  const favTools=tools.filter(t=>favorites.includes(t.id));
  let html='';
  if(favTools.length){
    html+=`<div style="margin-bottom:6px"><div style="font-size:9px;color:#FF8C00;font-weight:700;letter-spacing:2px;margin-bottom:8px">⭐ FAVORITES</div><div class="tool-grid" style="margin-bottom:12px">${favTools.map(t=>toolCard(t,runFn)).join('')}</div></div>`;
  }
  html+=`<div class="tool-grid">${tools.map(t=>toolCard(t,runFn)).join('')}</div>`;
  return html;
}

function toolCard(t,runFn){
  const isFav=favorites.includes(t.id);
  return `<button class="tool-card ${activeTool===t.id?'active':''}" onclick="${runFn}('${t.id}')">
    <div style="position:absolute;top:10px;right:10px;font-size:13px;cursor:pointer;opacity:${isFav?1:0.3}" onclick="event.stopPropagation();toggleFav('${t.id}')">${isFav?'⭐':'☆'}</div>
    <div class="tool-emoji">${t.icon}</div>
    <div class="tool-name">${t.name}</div>
    <div class="tool-desc">${t.desc}</div>
  </button>`;
}

// ── HOME PAGE ──
function homePage(){
  const usa=channels.filter(c=>c.type==='usa').length;
  const india=channels.filter(c=>c.type==='india').length;
  const selCh=channels.find(c=>c.id===selectedChannel);
  return `<div class="page">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:#FFD700">${channels.length}</div><div class="stat-lbl">CHANNELS</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#4488FF">${usa}</div><div class="stat-lbl">USA</div></div>
    </div>
    <div class="stats-row" style="margin-top:-6px">
      <div class="stat-box"><div class="stat-num" style="color:#FF6644">${india}</div><div class="stat-lbl">INDIA</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#00FF88">${history.length}</div><div class="stat-lbl">SAVED</div></div>
    </div>

    ${selCh?`<div class="selected-ch-bar">
      <div><div style="font-size:10px;color:#FF8C00;font-weight:700;letter-spacing:1px;margin-bottom:2px">ACTIVE CHANNEL</div>
      <div style="font-size:13px;font-weight:700">${selCh.type==='usa'?'🇺🇸':'🇮🇳'} ${selCh.name} • ${selCh.niche}</div></div>
      <button class="btn-sm" onclick="selectChannel(${selCh.id})" style="font-size:11px">✕</button>
    </div>`:''}

    <div class="sec-title">MY CHANNELS</div>
    <button class="btn-primary" onclick="toggleAddForm()" style="margin-bottom:12px">+ Add New Channel</button>
    <div class="add-form" id="add-form">
      <div class="field"><div class="field-lbl">Channel Name</div><input class="inp" id="ch-name" placeholder="My Finance Channel"></div>
      <div class="field"><div class="field-lbl">Type</div><select class="sel" id="ch-type"><option value="usa">🇺🇸 USA Channel</option><option value="india">🇮🇳 India Channel</option></select></div>
      <div class="field"><div class="field-lbl">Niche</div><input class="inp" id="ch-niche" placeholder="Personal Finance"></div>
      <button class="btn-green" onclick="addChannel()">✓ Add Channel</button>
    </div>

    ${channels.length===0?`<div class="empty-state"><div class="empty-icon">📺</div><div class="empty-text">No channels yet</div><div class="empty-sub">Tap "+ Add New Channel" to start</div></div>`:
    channels.map(ch=>`<div class="ch-card ${selectedChannel===ch.id?'selected':''}" onclick="selectChannel(${ch.id})">
      <div class="ch-avatar" style="background:${ch.type==='usa'?'rgba(68,136,255,0.15)':'rgba(255,102,68,0.15)'}">${ch.type==='usa'?'🇺🇸':'🇮🇳'}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-badges">
          <span class="badge ${ch.type==='usa'?'badge-usa':'badge-india'}">${ch.type==='usa'?'USA':'INDIA'}</span>
          <span class="badge badge-niche">${ch.niche}</span>
          ${selectedChannel===ch.id?'<span class="badge" style="background:rgba(255,140,0,0.15);color:#FF8C00">ACTIVE</span>':''}
        </div>
      </div>
      <button onclick="event.stopPropagation();deleteChannel(${ch.id})" style="background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.2);border-radius:8px;color:#FF6666;font-size:12px;padding:6px 10px;cursor:pointer;font-family:inherit;flex-shrink:0">✕</button>
    </div>`).join('')}

    <div class="sec-title">QUICK ACCESS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
      ${[{id:'create',i:'▶',n:'YouTube',c:'#FF4444'},{id:'social',i:'◉',n:'Social Media',c:'#E1306C'},{id:'factory',i:'⚙',n:'Content Factory',c:'#FFB800'},{id:'more',i:'◆',n:'Strategy & More',c:'#AA44FF'}].map(x=>`
        <button onclick="goTo('${x.id}')" style="background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;text-align:left;color:var(--text);font-family:inherit;display:flex;align-items:center;gap:10px;transition:all 0.2s">
          <span style="font-size:18px;color:${x.c}">${x.i}</span>
          <span style="font-size:13px;font-weight:600">${x.n}</span>
        </button>`).join('')}
    </div>
  </div>`;
}

// ── CREATE PAGE ──
function createPage(){
  const selCh=channels.find(c=>c.id===selectedChannel);
  return `<div class="page">
    <div class="sec-title">YOUTUBE CONTENT</div>
    ${selCh?`<div class="selected-ch-bar" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:600">${selCh.type==='usa'?'🇺🇸':'🇮🇳'} ${selCh.name} — niche auto-filled</div>
    </div>`:''}
    <div class="card">
      <div class="field"><div class="field-lbl">Your Niche</div>
        <input class="inp" id="niche" placeholder="e.g. Personal Finance" oninput="window._niche=this.value;saveData()">
      </div>
      <div class="field"><div class="field-lbl">Video Topic</div>
        <input class="inp" id="topic" placeholder="e.g. 5 Ways to Save Money" oninput="window._topic=this.value;saveData()">
        <div class="word-count" id="topic-wc">${wordCount(window._topic)}</div>
      </div>
      <div class="field" style="margin-bottom:0"><div class="field-lbl">Language</div>
        <select class="sel" id="lang" onchange="window._lang=this.value;saveData()">
          <option value="english">🇺🇸 English (USA)</option>
          <option value="hindi">🇮🇳 Hindi (India)</option>
        </select>
      </div>
    </div>
    <div class="sec-title">SELECT TOOL</div>
    ${toolGrid(YT_TOOLS,'runYT')}
    ${outputHTML()}
  </div>`;
}

// ── SOCIAL PAGE ──
function socialPage(){
  const platforms=[{id:'instagram',emoji:'📸',name:'Instagram'},{id:'tiktok',emoji:'🎵',name:'TikTok'},{id:'facebook',emoji:'👥',name:'Facebook'},{id:'twitter',emoji:'🐦',name:'Twitter'},{id:'linkedin',emoji:'💼',name:'LinkedIn'}];
  return `<div class="page">
    <div class="sec-title">PLATFORM</div>
    <div class="plat-row">${platforms.map(p=>`<div class="plat-chip ${activeSocial===p.id?'active':''}" onclick="setSocial('${p.id}')"><span class="plat-emoji">${p.emoji}</span><span class="plat-name">${p.name}</span></div>`).join('')}</div>
    <div class="card">
      <div class="field"><div class="field-lbl">Your Niche</div><input class="inp" id="niche" placeholder="e.g. Personal Finance" oninput="window._niche=this.value;saveData()"></div>
      <div class="field" style="margin-bottom:0"><div class="field-lbl">Topic</div><input class="inp" id="topic" placeholder="e.g. 5 Ways to Save Money" oninput="window._topic=this.value;saveData()"></div>
    </div>
    <div class="sec-title">TOOLS</div>
    ${toolGrid(SOCIAL_TOOLS[activeSocial]||[],'runSocial')}
    ${outputHTML()}
  </div>`;
}

// ── FACTORY PAGE ──
function factoryPage(){
  const txt=window._factory_text||'';
  return `<div class="page">
    <div class="sec-title">CONTENT FACTORY</div>
    <div class="card">
      <div class="field-lbl">PASTE YOUR SCRIPT / CONTENT</div>
      <textarea class="inp" id="factory-text" placeholder="Apna script ya content yahan paste karo..." oninput="window._factory_text=this.value;updateFactoryCount()">${escapeHtml(txt)}</textarea>
      <div class="word-count" id="factory-wc">${wordCount(txt)}</div>
    </div>
    <div class="sec-title">TOOLS</div>
    ${toolGrid(FACTORY_TOOLS,'runFactory')}
    ${outputHTML()}
  </div>`;
}

window.updateFactoryCount=function(){
  const el=document.getElementById('factory-wc');
  if(el) el.textContent=wordCount(window._factory_text);
};

// ── MORE PAGE (Strategy + History) ──
function morePage(){
  const times=[{p:'YouTube',t:'Sat–Sun 2–4 PM EST',c:'#FF4444',i:'▶'},{p:'Instagram',t:'Mon–Fri 11 AM EST',c:'#E1306C',i:'📸'},{p:'TikTok',t:'Tue–Thu 7–9 PM EST',c:'#00F2EA',i:'🎵'},{p:'Facebook',t:'Wed–Fri 1–3 PM EST',c:'#4488FF',i:'👥'}];
  return `<div class="page">
    <div class="sec-title">STRATEGY</div>
    <div class="card">
      <div class="field-lbl">YOUR NICHE</div>
      <input class="inp" id="strat-niche" placeholder="e.g. Personal Finance USA" oninput="window._strat_niche=this.value;saveData()">
    </div>
    ${toolGrid(STRAT_TOOLS,'runStrat')}
    ${outputHTML()}

    <div class="sec-title">HISTORY (${history.length})</div>
    ${history.length===0?`<div class="empty-state" style="padding:24px 20px"><div class="empty-icon">📋</div><div class="empty-text">No history yet</div><div class="empty-sub">Generate content to see history</div></div>`:''}
    ${history.slice(0,10).map(h=>`
      <div class="hist-item">
        <div class="hist-header">
          <div>
            <div class="hist-title">${h.tool||'Content'} — ${h.niche||''}</div>
            <div class="hist-meta">${h.topic||''} • ${h.time}</div>
          </div>
          <button class="btn-sm" onclick="copyHistItem(${h.id})" style="font-size:11px;flex-shrink:0">Copy</button>
        </div>
        <div class="hist-preview">${escapeHtml(h.output||'')}</div>
      </div>`).join('')}
    ${history.length>0?`<button class="btn-sm" onclick="clearHistory()" style="width:100%;margin-bottom:12px;color:#FF6666">🗑 Clear History</button>`:''}

    <div class="sec-title">BEST POSTING TIMES</div>
    ${times.map(t=>`<div class="time-card"><div class="time-icon" style="background:${t.c}18;color:${t.c}">${t.i}</div><div><div style="font-weight:700;font-size:14px;margin-bottom:3px">${t.p}</div><div style="font-size:12px;color:var(--text3)">${t.t}</div></div></div>`).join('')}

    <div class="sec-title">USA VS INDIA CPM</div>
    <div class="cpm-row">
      ${[{l:'Finance',usa:'$15–40',india:'$1–5'},{l:'Health',usa:'$10–25',india:'$1–4'},{l:'Tech',usa:'$8–20',india:'$1–3'},{l:'Motivation',usa:'$8–18',india:'$1–4'}].map(r=>`
        <div class="cpm-box">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">${r.l}</div>
          <div style="margin-bottom:5px"><div style="font-size:9px;color:var(--text3);margin-bottom:2px">🇺🇸 USA</div><div style="font-size:16px;font-weight:800;color:#4488FF">${r.usa}</div></div>
          <div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">🇮🇳 India</div><div style="font-size:16px;font-weight:800;color:#FF6644">${r.india}</div></div>
        </div>`).join('')}
    </div>
    <div style="height:16px"></div>
  </div>`;
}

// ── ACTIONS ──
window.runYT=function(tid){
  const n=window._niche,t=window._topic,l=window._lang||'english';
  if(!n||!t){alert('Niche aur Topic daalo!');return;}
  activeTool=tid; saveData();
  const tool=YT_TOOLS.find(x=>x.id===tid);
  callAI(tool.p(n,t,l),tool.name);
};
window.runSocial=function(tid){
  const n=window._niche,t=window._topic;
  if(!n||!t){alert('Niche aur Topic daalo!');return;}
  activeTool=tid;
  const tool=SOCIAL_TOOLS[activeSocial]?.find(x=>x.id===tid);
  if(tool) callAI(tool.p(n,t),tool.name);
};
window.runFactory=function(tid){
  const c=window._factory_text;
  if(!c){alert('Content paste karo!');return;}
  activeTool=tid;
  const tool=FACTORY_TOOLS.find(x=>x.id===tid);
  callAI(tool.p(c),tool.name);
};
window.runStrat=function(tid){
  const n=window._strat_niche;
  if(!n){alert('Niche daalo!');return;}
  activeTool=tid;
  const tool=STRAT_TOOLS.find(x=>x.id===tid);
  callAI(tool.p(n),tool.name);
};
window.setSocial=function(pid){activeSocial=pid;activeTool=null;aiOutput='';render();};
window.toggleAddForm=function(){document.getElementById('add-form')?.classList.toggle('open');};
window.addChannel=function(){
  const n=document.getElementById('ch-name')?.value?.trim();
  const tp=document.getElementById('ch-type')?.value;
  const ni=document.getElementById('ch-niche')?.value?.trim();
  if(!n||!ni){alert('Name aur Niche daalo!');return;}
  channels.push({id:Date.now(),name:n,type:tp,niche:ni});
  saveData(); render();
};
window.deleteChannel=function(id){
  if(!confirm('Delete this channel?')) return;
  channels=channels.filter(c=>c.id!==id);
  if(selectedChannel===id){selectedChannel=null;window._niche='';}
  saveData(); render();
};
window.copyHistItem=function(id){
  const h=history.find(x=>x.id===id);
  if(h){navigator.clipboard.writeText(h.output);alert('Copied! ✅');}
};
window.clearHistory=function(){
  if(confirm('Clear all history?')){history=[];saveData();render();}
};

// ── INIT ──
loadData();
render();
</script>
</body>
</html>
